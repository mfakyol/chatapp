# Production stack — behind the host's nginx (which terminates TLS).
#
# Three containers:
#   - server : Express + Socket.io API (uses the shared MongoDB)
#   - client : Next.js (standalone) app
#   - proxy  : nginx that routes /api,/uploads,/socket.io -> server, rest -> client
#
#   1. cp .env.example .env   &&   fill in the values (incl. MONGO_URI)
#   2. docker network create shared      # once on the host, if not already
#   3. docker compose -f docker-compose.prod.yml up -d --build
#
# Only the proxy is published, on 127.0.0.1:8082. The host nginx reverse-proxies
# the domain to that port (see deploy/nginx-host.conf.example).

services:
  server:
    build: ./server
    environment:
      - PORT=4000
      - NODE_ENV=production
      # Shared MongoDB — full URI (with this project's DB user) lives in .env.
      - MONGO_URI=${MONGO_URI:?set MONGO_URI in .env}
      - JWT_SECRET=${JWT_SECRET:?set JWT_SECRET in .env}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      # CORS + Socket.io origin. Must be the public HTTPS origin.
      - CLIENT_URL=https://${DOMAIN:?set DOMAIN in .env}
    volumes:
      - chat-uploads:/app/uploads
    networks:
      - default
      - shared
    expose:
      - "4000"
    restart: unless-stopped

  client:
    build:
      context: ./client
      args:
        # Baked into the client bundle at build time (same-origin, path-routed).
        NEXT_PUBLIC_API_URL: https://${DOMAIN:?set DOMAIN in .env}/api
        NEXT_PUBLIC_SOCKET_URL: https://${DOMAIN:?set DOMAIN in .env}
    expose:
      - "3000"
    restart: unless-stopped

  proxy:
    image: nginx:alpine
    depends_on:
      - client
      - server
    volumes:
      - ./proxy/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "127.0.0.1:8082:80"
    restart: unless-stopped

networks:
  shared:
    external: true

volumes:
  chat-uploads:
